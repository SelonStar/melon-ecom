<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f5ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c6fba;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a5299;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#154080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74b3f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#2c6fba" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#c8ddf5" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#4a90d9" stroke-width="0.4" opacity="0.2"/>

  <g filter="url(#shadow)">
    <!-- Front face -->
    <rect x="63" y="76" width="54" height="54" rx="2" fill="url(#boxFront)"/>
    <!-- Side face (right) -->
    <polygon points="117,76 133,64 133,118 117,130" fill="url(#boxSide)"/>
    <!-- Top face -->
    <polygon points="63,76 79,64 133,64 117,76" fill="url(#boxTop)"/>
  </g>

  <!-- Horizontal tape on front -->
  <rect x="63" y="99" width="54" height="7" fill="#ffffff" opacity="0.25"/>
  <!-- Vertical tape on front -->
  <rect x="87" y="76" width="7" height="54" fill="#ffffff" opacity="0.25"/>
  <!-- Vertical tape on top face -->
  <polygon points="90,64 97,64 117,76 110,76" fill="#ffffff" opacity="0.2"/>

  <!-- Smile arrow, centered -->
  <path d="M 63 150 Q 100 165 137 150" stroke="#2c6fba" stroke-width="3.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="132,145 140,150 132,155" fill="#2c6fba"/>

  <!-- Sparkles -->
  <g opacity="0.5">
    <circle cx="40" cy="58" r="1.5" fill="#4a90d9"/>
    <circle cx="50" cy="44" r="1" fill="#2c6fba"/>
    <circle cx="33" cy="72" r="1" fill="#4a90d9"/>
  </g>
  <g opacity="0.5">
    <circle cx="160" cy="50" r="1.5" fill="#4a90d9"/>
    <circle cx="170" cy="65" r="1" fill="#2c6fba"/>
    <circle cx="150" cy="38" r="1" fill="#4a90d9"/>
  </g>
</svg>
